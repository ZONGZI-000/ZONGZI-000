<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="tag-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fffbeb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bg)" rx="16" stroke="#e7e5e4" stroke-width="1"/>

  <!-- Decorative circles -->
  <circle cx="1100" cy="60" r="180" fill="#d97706" opacity="0.04"/>
  <circle cx="100" cy="320" r="120" fill="#f59e0b" opacity="0.03"/>
  <circle cx="600" cy="190" r="250" fill="#d97706" opacity="0.02"/>

  <!-- Accent line -->
  <rect x="60" y="120" width="60" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title: Chinese -->
  <text x="60" y="175" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="48" font-weight="700" fill="#1c1917" letter-spacing="2">
    <tspan>👋 你好，我是<tspan fill="#d97706">粽子</tspan></tspan>
  </text>

  <!-- Title: English -->
  <text x="60" y="215" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" fill="#78716c" letter-spacing="1">
    <tspan>Hello, I'm Zongzi.</tspan>
  </text>

  <!-- Tags -->
  <rect x="60" y="240" width="100" height="32" rx="16" fill="url(#tag-bg)" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>
  <text x="110" y="261" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">产品</text>

  <rect x="172" y="240" width="100" height="32" rx="16" fill="url(#tag-bg)" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>
  <text x="222" y="261" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">设计</text>

  <rect x="284" y="240" width="120" height="32" rx="16" fill="url(#tag-bg)" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>
  <text x="344" y="261" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">AI 技术</text>

  <rect x="416" y="240" width="120" height="32" rx="16" fill="url(#tag-bg)" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>
  <text x="476" y="261" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">知识管理</text>

  <!-- English tags -->
  <text x="60" y="300" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" fill="#a8a29e" letter-spacing="0.5">
    <tspan>Product · Design · AI Technology · Knowledge Management</tspan>
  </text>

  <!-- Quote -->
  <text x="60" y="340" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="14" fill="#a8a29e" font-style="italic">
    <tspan>"致力于创造和传递长期价值，探索产品、AI和知识管理的无限可能"</tspan>
  </text>

  <!-- Right: animation GIF -->
  <defs>
    <clipPath id="avatar-clip">
      <circle cx="960" cy="190" r="65"/>
    </clipPath>
  </defs>
  <circle cx="960" cy="190" r="85" fill="none" stroke="#d97706" stroke-opacity="0.1" stroke-width="1.5"/>
  <circle cx="960" cy="190" r="70" fill="none" stroke="#d97706" stroke-opacity="0.07" stroke-width="1"/>
  <image href="../animation.gif" x="895" y="125" width="130" height="130" clip-path="url(#avatar-clip)" preserveAspectRatio="xMidYMid slice"/>
</svg>
