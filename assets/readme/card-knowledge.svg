<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 160" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf9"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="160" fill="url(#bg)" rx="16"/>
  <rect x="30" y="30" width="32" height="3" rx="1.5" fill="url(#accent)"/>
  <text x="78" y="35" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="22" font-weight="600" fill="#1c1917">📖 知识库资源</text>

  <!-- Card 1: 历史研究 -->
  <rect x="40" y="65" width="360" height="72" rx="12" fill="#faf5ff" stroke="#d97706" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="55" y="80" width="40" height="40" rx="8" fill="#4C51BF"/>
  <text x="75" y="106" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">📜</text>
  <text x="110" y="100" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="17" font-weight="600" fill="#1c1917">历史研究</text>
  <text x="110" y="120" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#78716c">知识沉淀 · 持续更新</text>

  <!-- Card 2: 产品设计 -->
  <rect x="420" y="65" width="360" height="72" rx="12" fill="#f0fdf4" stroke="#d97706" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="435" y="80" width="40" height="40" rx="8" fill="#0F766E"/>
  <text x="455" y="106" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">📐</text>
  <text x="490" y="100" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="17" font-weight="600" fill="#1c1917">产品设计</text>
  <text x="490" y="120" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#78716c">产品思维 · 方案落地</text>

  <!-- Card 3: AI & 技术 -->
  <rect x="800" y="65" width="360" height="72" rx="12" fill="#fefce8" stroke="#d97706" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="815" y="80" width="40" height="40" rx="8" fill="#7C3AED"/>
  <text x="835" y="106" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">🤖</text>
  <text x="870" y="100" font-family="-apple-system,BlinkMacSystemFont,PingFang SC,sans-serif" font-size="17" font-weight="600" fill="#1c1917">AI & 技术</text>
  <text x="870" y="120" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" fill="#78716c">AI 探索 · 技术实践</text>
</svg>
